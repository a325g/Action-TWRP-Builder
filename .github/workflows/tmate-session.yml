name: Debug Workflow

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Start tmate session?'
        required: false
        type: boolean
        default: true

jobs:
  debug-session:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space (Slimhub)
        uses: rokibhasansagar/slimhub_actions@main

      - name: Max Aggressive Extra Cleanup
        run: |
          echo "=== Removing extra bulky directories ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Check Available Space
        run: |
          echo "=== Disk Space After Slimhub & Manual Clean ==="
          df -h

      - name: Start tmate session
        # Only runs if you checked the box during manual trigger
        if: ${{ github.event.inputs.debug_enabled == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with: 
           limit-access-to-actor: false

      - name: Finalize Build
        run: echo "Workflow continued after tmate session was closed."
        
